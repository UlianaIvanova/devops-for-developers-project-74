services:
  app:
    build:
      context: .
      dockerfile: Dockerfile 
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: make dev
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:latest

    ports:
      - "8081:80" 
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
