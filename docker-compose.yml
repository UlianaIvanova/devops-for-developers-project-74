services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    command: |
      sh -c "
        echo ':80 { reverse_proxy app:8080 }' > /etc/caddy/Caddyfile &&
        echo ':443 { reverse_proxy app:8080; tls internal }' >> /etc/caddy/Caddyfile &&
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      "
    depends_on:
      - app