services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

  app:
    build: ./app
    environment:
      DATABASE_HOST: db
      DATABASE_PASSWORD: password
      DATABASE_USER: postgres
      DATABASE_NAME: postgres
    depends_on:
      - db
    command: npm start

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    depends_on:
      - app